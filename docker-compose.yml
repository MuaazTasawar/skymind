version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: skymind_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  planner:
    build:
      context: ./planner
      dockerfile: Dockerfile
    container_name: skymind_planner
    restart: unless-stopped
    environment:
      PLANNER_GRPC_PORT: ${PLANNER_GRPC_PORT}
    ports:
      - "${PLANNER_GRPC_PORT}:50051"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: skymind_gateway
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GATEWAY_PORT: ${GATEWAY_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS}
      PLANNER_GRPC_HOST: planner
      PLANNER_GRPC_PORT: ${PLANNER_GRPC_PORT}
    ports:
      - "${GATEWAY_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      planner:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skymind_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${GATEWAY_PORT}
      NEXT_PUBLIC_WS_URL: ws://localhost:${GATEWAY_PORT}/ws
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  postgres_data: